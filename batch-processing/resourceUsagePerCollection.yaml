title: Resource Usage Plots for up to three Collections
description: Generate plots comparing runtime and memory usage stats for up to three collections
authors:
  - name: Yusra AlSayyad
    slack: yusra
tags:
  - batch-processing
parameters:
  repo1:
    type: string
    description: Butler repo of first collection to display
    default: "dp2_prep"
  collection1:
    type: string
    description: Collection name containing a ResourceUsageSummary to display. Wildcards OK.
    default: "LSSTCam/runs/DRP/20250417_20250921/w_2025_49/DM-53545/*"
  repo2:
    type: string
    description: Optional Butler repo of second collection to compare
    default: "dp2_prep"
  collection2:
    type: string
    description: Optional second collection of resource usage statistics to compare
    default: "LSSTCam/runs/DRP/20250417_20250723/d_2025_11_21/DM-53374/*"
  repo3:
    type: string
    description: Optional Butler repo of third collection to compare
    default: "dp2_prep"
  collection3:
    type: string
    description: Optional third collection of resource usage statistics to compare
    default: "u/yusra/v30_0_0_rc2/resource_usage_test"
